; PlatformIO override for LOLIN S2 Mini + INMP441 I2S microphone
; Wiring: SCK=GPIO14, WS=GPIO13, SD=GPIO10, VDD=3.3V, GND=GND, L/R=GND
[env:lolin_s2_mini]
build_flags = ${common.build_flags} ${esp32s2.build_flags} -D WLED_RELEASE_NAME=\"ESP32-S2\"
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DARDUINO_USB_DFU_ON_BOOT=0
  -DBOARD_HAS_PSRAM
  -DLOLIN_WIFI_FIX
  -D WLED_WATCHDOG_TIMEOUT=0
  -D DATA_PINS=16
  -D HW_PIN_SCL=35
  -D HW_PIN_SDA=33
  -D HW_PIN_CLOCKSPI=7
  -D HW_PIN_DATASPI=11
  -D HW_PIN_MISOSPI=9
  -D I2S_SDPIN=10
  -D I2S_WSPIN=13
  -D I2S_CKPIN=14
  -D SR_DMTYPE=1
